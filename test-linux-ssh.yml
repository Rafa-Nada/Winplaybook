---
- name: Test SSH connectivity to Linux VM
  hosts: all
  gather_facts: false

  tasks:
    - name: Test Ansible SSH connection
      ansible.builtin.ping:

    - name: Check hostname
      ansible.builtin.command: hostname
      register: hostname_result

    - name: Show hostname
      ansible.builtin.debug:
        msg: "Connected successfully. Hostname is {{ hostname_result.stdout }}"
